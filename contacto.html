<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <title>
    Contacto | Abolegal
  </title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="styles.css"
  >

</head>

<body>

<!-- FONDO -->
<canvas id="bg-canvas"></canvas>

<!-- HEADER -->
<header class="header">

  <div class="nav-container">

    <!-- IZQUIERDA -->
    <nav class="nav nav-left">
      <a href="./">Inicio</a>

      <a href="./servicios.html">
        Servicios
      </a>
    </nav>

    <!-- LOGO -->
    <div class="logo">

      <a href="./">

        <img
          src="./assets/logo.png"
          alt="Abolegal"
          class="logo-img"
        >

      </a>

    </div>

    <!-- DERECHA -->
    <div class="nav-right">

      <nav class="nav">

        <a href="./equipo.html">
          Equipo
        </a>

        <a href="./contacto.html">
          Contacto
        </a>

      </nav>

      <div class="cta">

        <button>
          Agendar
        </button>

      </div>

    </div>

    <!-- HAMBURGUESA -->
    <div
      class="hamburger"
      onclick="toggleMenu()"
    >
      ☰
    </div>

  </div>

  <!-- MOBILE MENU -->
  <div
    id="mobileMenu"
    class="mobile-menu"
  >

    <a href="./">Inicio</a>

    <a href="./servicios.html">
      Servicios
    </a>

    <a href="./equipo.html">
      Equipo
    </a>

    <a href="./contacto.html">
      Contacto
    </a>

    <button>
      Agendar
    </button>

  </div>

</header>

<!-- HERO -->
<main class="page-hero">

  <span class="page-tag">
    Contacto
  </span>

  <h1>
    Cuéntanos tu situación.
  </h1>

  <p>
    Nuestro equipo revisará tu caso
    y te responderá a la brevedad.
  </p>

</main>

<!-- CONTACTO -->
<section class="contact-layout">

  <div class="contact-card">

    <h3>
      Información de contacto
    </h3>

    <div class="contact-item">
      ✉ contacto@abolegal.cl
    </div>

    <div class="contact-item">
      ☎ +56 9 XXXX XXXX
    </div>

    <div class="contact-item">
      ⌂ Santiago, Chile
    </div>

  </div>

  <div class="contact-form-card">

    <h3>
      Escríbenos
    </h3>

    <form class="contact-form">

      <input
        type="text"
        placeholder="Nombre"
      >

      <input
        type="email"
        placeholder="Correo"
      >

      <textarea
        placeholder="Describe tu situación"
      ></textarea>

      <button>
        Enviar consulta
      </button>

    </form>

  </div>

</section>

<script src="app.js"></script>

</body>
</html>
